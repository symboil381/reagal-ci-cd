name: WooCommerce Order Test

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run order flow test
        run: npx playwright test order-flow.spec.ts

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Send email alert on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: 🚨 RegalWatch Order Test FAILED — ${{ github.run_id }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: RegalWatch Monitor <${{ secrets.GMAIL_USER }}>
          body: |
            ❌ The WooCommerce order flow test has FAILED.

            ───────────────────────────────
            🕐 Time     : ${{ github.event.repository.updated_at }}
            🔁 Run ID   : ${{ github.run_id }}
            🌿 Branch   : ${{ github.ref_name }}
            ───────────────────────────────

            📋 View full report and logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            📥 Download HTML report from the Artifacts section of the link above.

            ───────────────────────────────
            This is an automated message from GitHub Actions.
            To stop these alerts, disable the workflow in your repository.